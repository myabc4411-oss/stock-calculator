<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스노우볼: 주식 투자 복리 & 세금 계산기</title>
    <meta name="google-site-verification" content="8tJ4J-V5OcF0EDSyiqgGHbkSmeojpwm4FdE8X1ctQ4M" />
    <meta name="description" content="주식 투자자를 위한 복리 및 세금 계산기입니다. 미국 주식, 한국 주식의 양도세, 배당세, 종합소득세를 고려한 실질 수익을 계산해보세요.">
<meta name="keywords" content="복리계산기, 주식계산기, 파이어족, 미국주식세금, 배당금계산기, 스노우볼효과">
<meta name="author" content="파이어족 예비 투자자">

<meta property="og:title" content="📈 스노우볼: 주식 복리 & 세금 계산기">
<meta property="og:description" content="세금 떼고 진짜 내 돈은 얼마? 미국/한국 주식 복리 수익을 1초 만에 계산하세요.">
<meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/2662/2662503.png"> <meta property="og:url" content="https://money-calc-2025.netlify.app">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1d4ed8;
            --text-color: #1f2937;
            --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-color);
        }
        
        h1 span { color: var(--primary-color); }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .input-group { margin-bottom: 1.2rem; }
        .input-group.full { grid-column: span 2; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            text-align: right;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .unit {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        button:hover { background-color: var(--secondary-color); }

        .result-box {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px dashed #e5e7eb;
            display: none;
        }

        .summary-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        
        .row.total {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }

        .label { color: #6b7280; font-size: 0.95rem; }
        .value { font-weight: 700; color: #1f2937; font-size: 1.1rem; }
        .value.final { color: var(--primary-color); font-size: 1.4rem; }
        .value.tax { color: var(--danger-color); }
        .value.profit { color: #059669; }

        .alert-box {
            background-color: #fffbeb;
            border: 1px solid #fcd34d;
            color: #92400e;
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: flex;
            gap: 10px;
            align-items: start;
        }
        .alert-box i { margin-top: 3px; }

        @media (max-width: 480px) {
            .grid-inputs { grid-template-columns: 1fr; }
            .input-group.full { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 투자 <span>복리 & 세금</span> 계산기</h1>
    
    <div class="grid-inputs">
        <div class="input-group full">
            <label>초기 투자금</label>
            <div class="input-wrapper">
                <input type="text" id="initialAmount" value="10,000,000" onkeyup="formatCurrency(this)">
                <span class="unit">원</span>
            </div>
        </div>
        
        <div class="input-group full">
            <label>매월 적립금액</label>
            <div class="input-wrapper">
                <input type="text" id="monthlyAmount" value="2,000,000" onkeyup="formatCurrency(this)">
                <span class="unit">원</span>
            </div>
        </div>

        <div class="input-group">
            <label>주가 상승률 (연)</label>
            <div class="input-wrapper">
                <input type="number" id="priceGrowthRate" value="8">
                <span class="unit">%</span>
            </div>
        </div>

        <div class="input-group">
            <label>배당 수익률 (연)</label>
            <div class="input-wrapper">
                <input type="number" id="dividendYield" value="2">
                <span class="unit">%</span>
            </div>
        </div>

        <div class="input-group full">
            <label>투자 기간</label>
            <div class="input-wrapper">
                <input type="number" id="years" value="10">
                <span class="unit">년</span>
            </div>
        </div>
    </div>

    <button onclick="calculate()">세후 실수령액 계산하기 🧮</button>

    <div class="result-box" id="resultBox">
        <h3>📊 투자 결과 분석</h3>
        
        <div class="summary-card">
            <div class="row">
                <span class="label">총 자산 (세전)</span>
                <span class="value" id="grossTotal">0원</span>
            </div>
            <div class="row">
                <span class="label">투자 원금</span>
                <span class="value" id="totalPrincipal">0원</span>
            </div>
            <div class="row">
                <span class="label">순수익 (평가차익+배당)</span>
                <span class="value profit" id="grossProfit">0원</span>
            </div>
            
            <div class="row" style="margin-top: 15px; font-size: 0.9rem; color: #ef4444;">
                <span class="label">예상 세금 합계 (▼)</span>
                <span class="value tax" id="totalTax">0원</span>
            </div>
            <div class="row" style="font-size: 0.8rem; color: #9ca3af; margin-bottom: 0;">
                <span class="label">ㄴ 양도세 (250만 공제, 22%)</span>
                <span class="value" id="taxCapital">0원</span>
            </div>
            <div class="row" style="font-size: 0.8rem; color: #9ca3af;">
                <span class="label">ㄴ 배당세 (15%)</span>
                <span class="value" id="taxDividend">0원</span>
            </div>

            <div class="row total">
                <span class="label">💰 세후 실수령액</span>
                <span class="value final" id="netTotal">0원</span>
            </div>
        </div>

        <div id="warningSection"></div>

        <div style="position: relative; height: 300px; width: 100%; margin-top: 2rem;">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
    function formatCurrency(input) {
        let value = input.value.replace(/[^0-9]/g, '');
        if (value) input.value = Number(value).toLocaleString();
        else input.value = "";
    }

    function getNumberValue(id) {
        return Number(document.getElementById(id).value.replace(/,/g, ''));
    }

    let myChart = null;

    function calculate() {
        const initial = getNumberValue('initialAmount');
        const monthly = getNumberValue('monthlyAmount');
        const growthRate = Number(document.getElementById('priceGrowthRate').value);
        const divYield = Number(document.getElementById('dividendYield').value);
        const years = Number(document.getElementById('years').value);

        const months = years * 12;
        const monthlyGrowth = growthRate / 100 / 12;
        const monthlyDiv = divYield / 100 / 12;
        
        let currentTotal = initial;
        let totalPrincipal = initial;
        let totalDivIncome = 0;
        
        const labels = [];
        const dataPoints = [];
        const principalPoints = [];

        labels.push("0년");
        dataPoints.push(initial);
        principalPoints.push(initial);

        for(let i = 1; i <= months; i++) {
            let monthDiv = currentTotal * monthlyDiv;
            totalDivIncome += monthDiv;
            
            currentTotal = currentTotal * (1 + monthlyGrowth) + monthDiv;
            
            currentTotal += monthly;
            totalPrincipal += monthly;

            if (i % 12 === 0) {
                labels.push((i/12) + "년");
                dataPoints.push(Math.round(currentTotal));
                principalPoints.push(totalPrincipal);
            }
        }

        // 세금 계산
        const taxDividend = totalDivIncome * 0.15;
        const grossProfit = currentTotal - totalPrincipal;
        let taxableCapitalGain = grossProfit - 2500000;
        if(taxableCapitalGain < 0) taxableCapitalGain = 0;
        const taxCapital = taxableCapitalGain * 0.22;
        const totalTax = taxDividend + taxCapital;
        const netTotal = currentTotal - totalTax;

        document.getElementById('grossTotal').innerText = Math.round(currentTotal).toLocaleString() + "원";
        document.getElementById('totalPrincipal').innerText = totalPrincipal.toLocaleString() + "원";
        document.getElementById('grossProfit').innerText = "+" + Math.round(grossProfit).toLocaleString() + "원";
        document.getElementById('totalTax').innerText = "-" + Math.round(totalTax).toLocaleString() + "원";
        document.getElementById('taxCapital').innerText = Math.round(taxCapital).toLocaleString() + "원";
        document.getElementById('taxDividend').innerText = Math.round(taxDividend).toLocaleString() + "원";
        document.getElementById('netTotal').innerText = Math.round(netTotal).toLocaleString() + "원";

        // 경고 메시지
        const lastYearDivIncome = (currentTotal * (divYield/100));
        const warningDiv = document.getElementById('warningSection');
        warningDiv.innerHTML = "";

        if (lastYearDivIncome > 20000000) {
            warningDiv.innerHTML += `
                <div class="alert-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div>
                        <strong>금융소득 종합과세 주의!</strong><br>
                        마지막 해 예상 배당금이 <strong>${Math.round(lastYearDivIncome/10000).toLocaleString()}만원</strong>입니다. 
                        연 2,000만원을 초과하여 세금이 급증할 수 있습니다.
                    </div>
                </div>`;
        } else if (lastYearDivIncome > 10000000) {
             warningDiv.innerHTML += `
                <div class="alert-box" style="border-color: #fb923c; color: #c2410c;">
                    <i class="fas fa-info-circle"></i>
                    <div>
                        <strong>건강보험료 피부양자 자격 확인 필요</strong><br>
                        예상 연 배당금이 1,000만원을 넘습니다. 
                        피부양자 자격이 박탈되어 건보료가 부과될 수 있습니다.
                    </div>
                </div>`;
        }

        const resultBox = document.getElementById('resultBox');
        resultBox.style.display = 'block';
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });

        drawChart(labels, dataPoints, principalPoints);
    }

    function drawChart(labels, dataPoints, principalPoints) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();

        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(37, 99, 235, 0.5)');
        gradient.addColorStop(1, 'rgba(37, 99, 235, 0.05)');

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '세전 총 자산',
                        data: dataPoints,
                        borderColor: '#2563eb',
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 3
                    },
                    {
                        label: '투자 원금',
                        data: principalPoints,
                        borderColor: '#9ca3af',
                        borderDash: [5, 5],
                        fill: false,
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' },
                    // 2. 그래프 툴팁 수정: 글자색을 진하게 설정
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(255, 255, 255, 0.95)',
                        titleColor: '#111',  /* 제목(년도) 진한 검정 */
                        bodyColor: '#333',   /* 내용(금액) 진한 회색 */
                        borderColor: '#e5e7eb',
                        borderWidth: 1,
                        padding: 10,
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) label += ': ';
                                if (context.parsed.y !== null) label += context.parsed.y.toLocaleString() + '원';
                                return label;
                            }
                        }
                    }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: {
                        grid: { color: '#f1f5f9' },
                        ticks: {
                            callback: function(value) {
                                if(value >= 100000000) return (value/100000000).toFixed(1) + '억';
                                if(value >= 10000) return (value/10000).toFixed(0) + '만';
                                return value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
